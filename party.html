<!DOCTYPE html>
<html>
    <head>
        <title>Party</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="party.css">
    </head> 

   <body>
        <div class="header">
            <h1>PokemonTT</h1>
        </div>

     <div class="middle-section">

         <div class="party-card">
            
             <div class="card-colapsed"
                onclick="toggleCard(this.closest('.party-card'))">
                 <div class="sprite-container">
                    <img class="sprite" src="charizard.png" alt="Charizard">
                    <span class="level">Lvl.5</span>
                 </div>
                 
                 <div class="top-row">
                     <div class="name-line">
                        <span class="name">Charizard</span>
                        <span class="gender">&#9794;</span>
                     </div>
                     
                <div class="hp-bar">
                    <div class="fill hp-green" style="width: 97%">
                    </div>
                </div>
                 
                <div class="hp-number" data-current="145" data-max="150">
                    HP:145/150
                </div>

            </div>

</div>

<div class="card-expanded">

    <div class="stat-row hp-row">

        <input type="number"
               class="hp-input"
               placeholder="HP">

        <button class="damage-button" onclick="changeHP(this, 'damage')">
            Damage
        </button>

        <button class="heal-button" onclick="changeHP(this, 'heal')">
            Heal
        </button>
    </div>

    <div class="stat-row xp-row">

        <div class="xp-bar">
            <div class="xp-fill" style="width: 80%"></div>
        </div>

        <span class="xp-text" data-current="125">
            XP:125/250
        </span>

        <div class="xp-adder">
            <input type="number"
                class="xp-input"
                placeholder="XP">

            <button class="xp-button" onclick="addXP(this)">
                Add
            </button>
        </div>
        
    </div>

    

    <div class="moves">
        <span class="moves-header">
            Moves
        </span>

        <div class="move-row">
            <span class="move-name">
                Flamethrower
            </span>
            <span class="move-type">
                Fire
            </span>
            
        </div>

        <div class="move-pp">
            <span class="move-power">
                PWR:90
            </span>
            <span class="pp-number"
                data-current="10"
                data-max="15">
                10/15
            </span>
            <button class="pp-minus" onclick="changePP(this, -1)">
                -
            </button>
            <button class ="pp-plus" onclick="changePP(this, 1)">
                +
            </button>
        </div>

    </div>


    <div class="conditions-row">
        <span class="conditions-label">
            Conditions
        </span>
        
        <select class="conditions" onchange="updateConditions(this)">
            <option>None</option>
            <option>Burned</option>
            <option>Poisoned</option>
            <option>Sleep</option>
            <option>Paralyzed</option>
            <option>Frozen</option>
            <option>Confused</option>
        
        </select>
    </div>
   </div>
</div>

</div>
         <div class="bottom-section">
            <nav class="bottom-nav">
                              <button class="nav-btn" onclick="window.location.href='index.html'">
                                      <img src="Trainer-icon.png" alt="Trainer" class="nav-icon">
                                      <span>Trainer</span>
                              </button>
                              <button class="nav-btn" onclick="window.location.href='backpack.html'">
                                      <img src="Backpack-icon.png" alt="Backpack" class="nav-icon">
                                      <span>Backpack</span>
                              </button>
                              <button class="nav-btn" onclick="window.location.href='pokedex.html'">
                                      <img src="Pokedex-icon.png" alt="Pokedex" class="nav-icon">
                                      <span>Pokedex</span>
                              </button>
                              <button class="nav-btn active" onclick="window.location.href='party.html'">
                                      <img src="Team-icon.png" alt="Team" class="nav-icon">
                                      <span>Team</span>
                              </button>
                              <button class="nav-btn" onclick="window.location.href='badges.html'">
                                      <img src="Badges-icon.png" alt="Badges" class="nav-icon">
                                      <span>Badges</span>
                              </button>
                      </nav>


         </div>
<script src="party.js"></script>
</body>      
</html>
