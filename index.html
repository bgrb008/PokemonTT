<!DOCTYPE html>
<html>
<head>
        <title>Pokemon Trainer Sheet</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <style>
               body {
                   background-image: url("pokeball.png");
                   background-size: cover;
                   background-position: center;
                   background-repeat: no-repeat;
                   font-family: "PokemonSolid", sans-serif;
                   padding: 20px;
               }
                
                @font-face {
                        font-family: "PokemonSolid";
                        src: url(pokemonfont.woff) format("truetype");
                }
                
                h1 { text-align: center; }
                .pokemon {
                        background: white;
                        padding: 10px;
                        margin-bottom: 10px;
                        border-radius: 10px;
                }
                button { width: 100%; padding: 15px; font-size: 16px; }
                .field {
                        display: flex;
                        flex-direction: column;
                        align-items: flex-start;
                        margin-bottom: 15px;
                }
                .field label { margin-bottom: 5px; }
                input { width: 200px; padding: 8px; }
                .stats {
                        display: flex;
                        justify-content: space-between;
                        gap: 10px;
                        margin-top: 10px;
                        background: rgba(255,255,255,0.9);
                        border-radius: 8px;
                        padding: 5px;
                }
                .stat {
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        flex: 1;
                        background: rgba(255,255,255,0.9);
                        border-radius: 8px;
                        padding: 10px;
                }
                .stat input { width: 100%; text-align: center; padding: 5px; }
        </style>
</head>
<body>

<h1>PokemonTT</h1>

<div class="field">
        <label>Trainer Name:</label>
        <input id="trainerName" placeholder="Enter Name">
</div>
<div class="field">
        <label>Age:</label>
        <input id="age" placeholder="e.g. 25">
</div>
<div class="field">
        <label>Home Region:</label>
        <input id="home region" placeholder="region">
</div>
<div class="field">
        <label>Badges:</label>
        <input id="badges" placeholder="e.g. 3">
</div>

<div class="stats">
        <div class="stat"><label>Attack</label><input type="number"></div>
        <div class="stat"><label>Defense</label><input type="number"></div>
        <div class="stat"><label>Speed</label><input type="number"></div>
        <div class="stat"><label>HP</label><input type="number"></div>
</div>

<h2>Pokemon Team</h2>
<div id="team"></div>
<button onclick="addPokemon()">+ Add Pokemon</button>

<script src="app.js"></script>
</body>
</html>
