<!DOCTYPE html>
<html>
<head>
	<title>Pokemon Trainer Sheet</title>
	<meta name=“viewport” content=“width=device-width, initial-scale=1.0”>
	<link rel=“stylesheet” href=“style.css”>
</head>

<h1>Trainer Sheet</h1>

<div class="field">
	<label>Trainer Name:</label>
	<input id=“trainerName” placeholder=“Enter Name”>
</div>

<div class="field">
	<label>Age:</label>	
	<input id="age" placeholder=e.g. 25">
</div>

<div class="field">
	<label>Home Region:</label>
	<input id="home region" placeholder="region">
</div>

<label>Badges:</label>
<input id=“badges” placeholder=e.g. 3”>

<h2>Pokemon Team</h2>

<div id=“team”></div>

<button onclick=“addPokemon()”>+ Add Pokemon</button>

<script arc=“app.js”></script>

</body>
</html>
