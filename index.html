<!DOCTYPE html>
<html>
<head>
	<title>Pokemon Trainer Sheet</title>
	<meta name=“viewport” content=“width=device-width, initial-scale=1.0”>
	<link rel=“stylesheet” href=“style.css?v=2”>
</head>

<h1>PokemonTT</h1>

</body>

<div class="field">
	<label>Trainer Name:</label>
	<input id=“trainerName” placeholder=“Enter Name”>
</div>

<div class="field">
	<label>Age:</label>	
	<input id="age" placeholder="e.g. 25">
</div>

<div class="field">
	<label>Home Region:</label>
	<input id="home region" placeholder="region">
</div>

<label>Badges:</label>
<input id=“badges” placeholder="e.g. 3”>

<div class="stats">
	<div class="stat">
		<label>Attack</label>
		<input type="number">
	</div>

	<div class="stat">
		<label>Defense</label>
		<input type="number">
	</div>

	<div class="stat">
		<label>Speed</label>
		<input type="number">
	</div>

	<div class="stat">
		<label>HP</label>
		<input type="number">
	</div>
</div>

<h2>Pokemon Team</h2>

<div id=“team”></div>

<button onclick=“addPokemon()”>+ Add Pokemon</button>

<script src=“app.js”></script>

</body>
</html>
