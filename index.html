<!DOCTYPE html>
<html>
<head>
        <title>Pokemon Trainer Sheet</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <style>
               body {
                   background-image: url("pokeball.png");
                   background-size: cover;
                   background-position: center;
                   background-repeat: no-repeat;
                   min-height: 100vh;
                   margin: 0;
                   font-family: "PokemonSolid", sans-serif;
                   padding: 20px;
               }
                
                @font-face {
                        font-family: "PokemonSolid";
                        src: url(pokemonfont.woff) format("truetype");
                }
                
                h1 { text-align: center; }
                .pokemon {
                        background: white;
                        padding: 10px;
                        margin-bottom: 10px;
                        border-radius: 10px;
                }
                button { width: 100%; padding: 15px; font-size: 16px; }
                .field {
                        display: flex;
                        flex-direction: column;
                        align-items: flex-start;
                        margin-bottom: 15px;
                }
                .field label { margin-bottom: 5px; }
                input { width: 200px; padding: 8px; }
                .stats {
                        display: flex;
                        justify-content: space-between;
                        gap: 10px;
                        margin-top: 10px;
                        background: rgba(255,255,255,0.9);
                        border-radius: 8px;
                        padding: 5px;
                }
                .stat {
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        flex: 1;
                        background: rgba(255,255,255,0.9);
                        border-radius: 8px;
                        padding: 10px;
                }
                .stat input { width: 100%; text-align: center; padding: 5px; }

                select {
                    width: 150px;
                    parding: 5px;
                    border-radius: 8px;
                }
        </style>
</head>
<body>

<h1>PokemonTT</h1>

<div class="field">
        <label>Trainer Name:</label>
        <input id="trainerName" placeholder="Enter Name">
</div>
<div class="field">
        <label>Age:</label>
        <input id="age" placeholder="e.g. 25">
</div>
<div class="field">
        <label for="region">Home Region:</label>
        <select id="region" name="region">
                <option value="<--Choose Region--</option>
                <option value="kanto">Kanto</option>
                <option value="johto">Johto</option>
                <option value="hoenn">Hoenn</option>
                <option value="sinnoh">Sinnoh</option>
                <option value="unova">Unova</option>
                <option value="kalos">Kalos</option>
                <option value="alola">Alola</option>
                <oprion value="galar">Galar</oprion>
                <option value="paldea">Paldea</option>
        </select>
        
        
</div>
<div class="field">
        <label>Badges:</label>
        <input id="badges" placeholder="e.g. 3">
</div>

<div class="stats">
        <div class="stat"><label>knowledge</label><input type="number"></div>
        <div class="stat"><label>Defense</label><input type="number"></div>
        <div class="stat"><label>Speed</label><input type="number"></div>
        <div class="stat"><label>bond</label><input type="number"></div>
</div>

<div class="skills-section">
        <h3>skills</h3>

        <div class="skills grid">

                <div class="skill">
                     <label>Pokemon Lore</label>
                     <input type"number" class"mod">
                </div>

                <div class="skill">
                     <label>Battle Tactics</lavel>
                     <input type"number" class"mod"
                </div>

                

<script src="app.js"></script>
</body>
</html>
