<!DOCTYPE html>
<html>
<head>
        <title>PokemonTT</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <style>
               body {
                   background-image: url("pokeball.png");
                   background-size: cover;
                   background-position: center;
                   background-repeat: no-repeat;
                   min-height: 100vh;
                   margin: 0;
                   font-family: "PokemonSolid", sans-serif;
                   font-size: 16px;
                   line-height: 1.5;
                   letter-spacing: 1px;
                   padding: 20px;
               }
                
                .label {
                        color: black;
                        text-shadow: 0 0 4px white;
                }
                
                @font-face {
                        font-family: "PokemonSolid";
                        src: url(pokemonfont.woff) format("truetype");
                }
                
                h1 { 
                        text-align: center; 
                }
                
                .pokemon {
                        background: white;
                        padding: 10px;
                        margin-bottom: 10px;
                        border-radius: 10px;
                }
                button { 
                        width: 100%; padding: 15px; font-size: 16px; 
                }
                
                .field {
                        display: flex;
                        flex-direction: column;
                        align-items: flex-start;
                        margin-bottom: 10px;
                }
                .field label { 
                        margin-bottom: 5px; 
                }
                
                .field input { 
                        width: 100px; padding: 8px; 
                }
                
                .age {
                        display: flex;
                        flex-direction: column;
                        align-items: flex-start;
                        margin-bottom: 10px;
                }
                
                .age label {
                        margin-bottom: 5px;
                }
                
                .age input {
                        width: 50px; padding: 8px;
                }
                .additional-info {
                        display: grid;
                        grid-template-columns: repeat(3, 1fr);
                        gap: 10px;
                        margin-top: 10px;
                }
                
                .xp-container {
                        width: 100%;
                        height: 20px;
                        background-color: #f0f0f0;
                        border: 2px solid #000;
                        border-radius: 10px;
                        overflow: hidden;
                        margin: 20px auto;
                        position: relative;
                        
                }

                #xp-bar-fill {
                        height: 100%;
                        width: 0%;
                        
                }

                #xp-text {
                        font-family: Arial, sans-serif;
                        font-size: 12px;
                        text-align: center;
                }
                
                .info {
                        display: flex;
                        flex-direction: column;
                        gap: 5px;
                        margin-top: 5px;
                }
                
                .info label {
                        margin-bottom: 0px;
                }
                
                .info input {
                        width: 100px;
                        margin-bottom: 10px
                }        
                
                
                .stats {
                        display: flex;
                        justify-content: space-between;
                        gap: 10px;
                        margin-top: 10px;
                        background: rgba(255,255,255,0.9);
                        border-radius: 8px;
                        padding: 5px;
                }
                .stat {
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        flex: 1;
                        background: rgba(255,255,255,0.9);
                        border-radius: 8px;
                        padding: 10px;
                }
                .stat input { 
                        width: 100%; text-align: center; padding: 5px; 
                }

                select {
                    width: 150px;
                    parding: 5px;
                    border-radius: 8px;
                }

                .skills-section {
                    max-width: 500px;
                }

                .skills-grid {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 10px 20px;
                }

                .skill {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                }

                .skill label {
                    font-size: 14px;
                }

                .skill .mod {
                    width: 50px;
                    padding: 3px;
                    text-align: center;
                }

                .skill {
                    border: 1px solid #ccc;
                    padding: 5px;
                    background-radius- 6px;
                    background: #f9f9f9;
                }

                #backstory {
                    width: 100%;
                    height: 120px;
                    padding: 8px;
                    font-size: 14px
                    resize: verticle;
                    
                }
                
                textarea {
                        width: 100%;
                        box-sizing: border-box;
                        
                }

                .skill .mod{
                    width: 50px;
                    height: 22px;
                    padding: 2px;
                    font-size: 12px;
                    text-align: center;
                }
                
                
                
        </style>
</head>
<body>

<h1>PokemonTT</h1>

<div class="field">
        <label>Trainer Name:</label>
        <input id="trainerName" placeholder="Enter Name">
</div>
<div class="age">
        <label>Age:</label>
        <input id="age" placeholder="e.g. 25">
</div>

<div class="field">
        <label for="region">Home Region:</label>
        <select id="region" name="region">
                <option value="<--Choose Region--</option>
                <option value="kanto">Kanto</option>
                <option value="johto">Johto</option>
                <option value="hoenn">Hoenn</option>
                <option value="sinnoh">Sinnoh</option>
                <option value="unova">Unova</option>
                <option value="kalos">Kalos</option>
                <option value="alola">Alola</option>
                <oprion value="galar">Galar</oprion>
                <option value="paldea">Paldea</option>
        </select>
        
        
</div>

<div class="additional-info">
        <div class="info">
                <label>Level:</label>
                <input id="level" type="number" value="1">
        </div>
        
        <div class="info">
                <label>XP:</label>
                <input id="xp" type="number" placeholder="0">
        </div>
        
        <div class="info">
                <label>Pokecoins</label>
                <input id="pokecoins" placeholder="e.g. 250">
        </div>
        
</div>
        
<div class="xp-container">
        <div id="xp-bar-fill"></div>
</div>
        <p id="xp-text">0 / 100 xp</p>
        
</div>

<div class="field">
        <label>Backstory</label>
        <textarea id="backstory" name="backstory"></textarea>
</div>

<div class="stats">
        <div class="stat"><label>knowledge</label><input type="number"></div>
        <div class="stat"><label>Defense</label><input type="number"></div>
        <div class="stat"><label>Speed</label><input type="number"></div>
        <div class="stat"><label>bond</label><input type="number"></div>
</div>

<div class="skills-section">
        <h3>skills</h3>

        <div class="skills grid">

                <div class="skill">
                     <label>Pokemon Lore</label>
                     <input type="number" class="mod">
                </div>

                <div class="skill">
                     <label>Battle Tactics</label>
                     <input type="number" class="mod">
                </div>

                <div class="skill"
                     <label>Bonding</label>
                     <input type="number" class="mod">
                </div>

                <div class="skill"
                     <label>Command</label>
                     <input type="number" class="mod">
                </div>

                <div class="skill"
                     <label>Inspiration</label>
                     <input type="number" class="mod">
                </div>

                <div class="skill"
                     <label>Perception</label>
                     <input type="number" class="mod">
                </div>

                <div class="skill"
                     <label>Survival</label>
                     <input type="number" class="mod">
                </div>

                <div class="skill"
                     <label>Tracking</label>
                     <input type="number" class="mod">
                </div>

                <div class="skill"
                     <label>Catching</label>
                     <input type="number" class="mod">
                </div>

                <div class="skill"
                     <label>Empathy</label>
                     <input type="number" class="mod">
                </div>

                <div class="skill"
                     <label>Technoledgy</label>
                     <input type="number" class="mod">
                </div>

                

<script src="app.js"></script>
</body>
</html>
