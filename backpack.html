<!DOCTYPE html>
<html>
<head>
        <title>Backpack</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="backpack.css">
</head>
<body>
        <h1>Backpack</h1>

<div class="pokecoins">
        <label>Pokecoins</label>
        <input for="pokecoins" id="pokecoins" type="number" value="0">
</div>

<div class="pokecoins-adder">
        <input type="number" id="pokecoins-amount" placeholder="Amount">
        <button id="add-pokecoins-button" type="button">+</button>
        <button id="subtract-pokecoins-button" type>-</button>
</div>

<div class="pokeballs">
        <div class="pokeballs-top">
        <h3>Pokeballs</h3>
        <select id="pokeball-selector">
                <option value="">-- Select a Pokeball</option>
                <option value="Pokeball">Pokeball</option>
                <option value="Greatball">Greatball</option>
                <option value="Ultraball">Ultraball</option>
                <option value="Masterball">Masterball</option>
        </select>
                <ul id="pokeball-list"></ul>
        </div>
</div>

<div class="potions">
        <div class="potions-top">
        <h3>Potions</h3>
        <select id="potion-selector">
                <option value="">-- Select a potion --</option>
                <option value="Potion">Potion</option>
                <option value="Super Potion">Super Potion</option>
                <option value="Hyper Potion">Hyper Potion</option>
                <option value="Max Potion">Max Potion</option>
                <option value="Full Restore">Full Restore</option>
                <option value="Revive">Revive</option>
                <option value="Max Revive">Max Revive</option>
                <option value="Ether">Ether</option>
                <option value="Max Ether">Max Ether</option>
                <option value="Elixir">Elixir</option>
                <option value="Max Elixir">Max Elixir</option>
                </select>
        </div>
        <ul id="potion-list"></ul>
        
</div>
        
<script src="backpack.js"></script>
</body>
</html>
